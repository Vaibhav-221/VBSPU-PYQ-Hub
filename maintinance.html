<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Material – Coming Soon | VBSPU PYQ Hub</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @keyframes bob {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-7px); }
    }
    @keyframes swing {
      0%,100% { transform: rotate(-3deg); transform-origin: top center; }
      50%      { transform: rotate(3deg);  transform-origin: top center; }
    }
    @keyframes blink-wrench {
      0%,100% { opacity:1; }
      50%      { opacity:0.4; }
    }
    .hook-group { animation: bob 2.2s ease-in-out infinite; }
    .wrench-spin { animation: blink-wrench 2s ease-in-out infinite; }
    .explore-btn { transition: background 0.18s, transform 0.12s; }
    .explore-btn:hover { background:#1e40af !important; }
    .explore-btn:active { transform: scale(0.97); }
  </style>
</head>
<body style="margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:space-between;background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:32px 16px;">

  <!-- Top brand -->
  <nav class="nav-bar">
    <!-- Left Section -->
    <div class="nav-left">
        <img src="logo.png" alt="VBSPU Logo">
        <span class="site-name">VBSPU PYQ Hub</span>
    </div>

    <!-- Right Section -->
    <ul class="nav-links">
            <li class="nav-download"><a href="#">Download App</a></li>

        <li class="nav-btn"><a href="#">PYQs</a></li>
        <li class="script-btn"><a href="#">Contact Us</a></li>
    </ul>
</nav>
    <span style="font-size:14px;font-weight:700;color:#111827;letter-spacing:-0.2px;">VBSPU PYQ Hub</span>
  </div>

  <!-- Centre block -->
  <div style="display:flex;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:520px;">

    <!-- SVG Illustration -->
    <svg viewBox="0 0 520 280" width="100%" style="max-width:480px;margin-bottom:20px;" xmlns="http://www.w3.org/2000/svg">

      <!-- ── GROUND LINE ── -->
      <rect x="30" y="252" width="460" height="5" rx="2.5" fill="#f3f4f6"/>

      <!-- ══ TRUCK ══ -->
      <!-- Main body -->
      <rect x="30" y="208" width="210" height="44" rx="7" fill="#374151"/>
      <!-- Cab -->
      <rect x="218" y="195" width="72" height="57" rx="7" fill="#4b5563"/>
      <!-- Cab window -->
      <rect x="226" y="202" width="46" height="26" rx="4" fill="#bfdbfe"/>
      <!-- Headlight -->
      <rect x="287" y="235" width="8" height="5" rx="2" fill="#fef08a"/>
      <!-- Wheels -->
      <circle cx="72"  cy="253" r="15" fill="#1f2937"/>
      <circle cx="72"  cy="253" r="6"  fill="#9ca3af"/>
      <circle cx="72"  cy="253" r="2"  fill="#4b5563"/>
      <circle cx="144" cy="253" r="15" fill="#1f2937"/>
      <circle cx="144" cy="253" r="6"  fill="#9ca3af"/>
      <circle cx="144" cy="253" r="2"  fill="#4b5563"/>
      <circle cx="230" cy="253" r="15" fill="#1f2937"/>
      <circle cx="230" cy="253" r="6"  fill="#9ca3af"/>
      <circle cx="230" cy="253" r="2"  fill="#4b5563"/>
      <!-- Stabiliser leg -->
      <rect x="280" y="248" width="14" height="8" rx="2" fill="#6b7280"/>
      <!-- Boom base -->
      <rect x="258" y="190" width="18" height="62" rx="4" fill="#6b7280"/>

      <!-- ══ CRANE ARM ══ -->
      <!-- Main jib -->
      <rect x="175" y="72" width="265" height="12" rx="5" fill="#9ca3af"/>
      <!-- Lattice diagonals on jib -->
      <line x1="200" y1="72" x2="230" y2="84" stroke="#d1d5db" stroke-width="1.2"/>
      <line x1="230" y1="72" x2="260" y2="84" stroke="#d1d5db" stroke-width="1.2"/>
      <line x1="260" y1="72" x2="290" y2="84" stroke="#d1d5db" stroke-width="1.2"/>
      <line x1="290" y1="72" x2="320" y2="84" stroke="#d1d5db" stroke-width="1.2"/>
      <line x1="320" y1="72" x2="350" y2="84" stroke="#d1d5db" stroke-width="1.2"/>
      <!-- Counter weight -->
      <rect x="390" y="84" width="48" height="26" rx="5" fill="#6b7280"/>
      <!-- Vertical mast -->
      <rect x="258" y="72" width="16" height="120" rx="3" fill="#6b7280"/>
      <!-- Mast brace -->
      <line x1="266" y1="84"  x2="310" y2="140" stroke="#9ca3af" stroke-width="1.8"/>
      <line x1="266" y1="120" x2="310" y2="170" stroke="#9ca3af" stroke-width="1.8"/>

      <!-- Hoist rope -->
      <line x1="266" y1="84" x2="266" y2="150" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5 3"/>

      <!-- Hook block (animated) -->
      <g class="hook-group">
        <rect x="254" y="150" width="24" height="14" rx="3" fill="#4b5563"/>
        <path d="M266 164 Q257 178 266 188 Q275 178 266 164Z" fill="none" stroke="#4b5563" stroke-width="3" stroke-linecap="round"/>
      </g>

      <!-- ══ BILLBOARD / WEBSITE SCREEN ══ -->
      <!-- Left post -->
      <rect x="315" y="96" width="9" height="156" rx="3" fill="#9ca3af"/>
      <!-- Right post -->
      <rect x="430" y="96" width="9" height="156" rx="3" fill="#9ca3af"/>
      <!-- Screen frame -->
      <rect x="305" y="28" width="148" height="106" rx="9" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
      <!-- Browser bar -->
      <rect x="312" y="35" width="134" height="12" rx="3" fill="#f3f4f6"/>
      <circle cx="319" cy="41" r="3" fill="#fca5a5"/>
      <circle cx="328" cy="41" r="3" fill="#fcd34d"/>
      <circle cx="337" cy="41" r="3" fill="#6ee7b7"/>
      <!-- Content skeleton lines -->
      <rect x="312" y="54" width="80" height="7" rx="3" fill="#e5e7eb"/>
      <rect x="312" y="67" width="130" height="5" rx="2" fill="#f3f4f6"/>
      <rect x="312" y="78" width="110" height="5" rx="2" fill="#f3f4f6"/>
      <rect x="312" y="89" width="120" height="5" rx="2" fill="#f3f4f6"/>
      <rect x="312" y="100" width="90" height="5" rx="2" fill="#f3f4f6"/>
      <!-- Yellow stripes overlay (construction) -->
      <clipPath id="sc"><rect x="305" y="28" width="148" height="106" rx="9"/></clipPath>
      <g clip-path="url(#sc)" opacity="0.28">
        <line x1="305" y1="134" x2="453" y2="28"  stroke="#fbbf24" stroke-width="9"/>
        <line x1="330" y1="144" x2="453" y2="48"  stroke="#fbbf24" stroke-width="9"/>
        <line x1="280" y1="124" x2="428" y2="18"  stroke="#fbbf24" stroke-width="9"/>
        <line x1="355" y1="150" x2="453" y2="70"  stroke="#fbbf24" stroke-width="9"/>
      </g>
      <!-- Gear icon centre of screen -->
      <g class="wrench-spin">
        <text x="379" y="88" font-size="28" text-anchor="middle" fill="#f59e0b">⚙</text>
      </g>

      <!-- ══ WORKER FIGURE ══ -->
      <!-- Hard hat -->
      <ellipse cx="76" cy="203" rx="10" ry="5" fill="#f59e0b"/>
      <rect x="68" y="205" width="16" height="3" rx="1" fill="#f59e0b"/>
      <!-- Head -->
      <circle cx="76" cy="208" r="7" fill="#fde68a"/>
      <!-- Body -->
      <rect x="70" y="215" width="12" height="16" rx="3" fill="#2563eb"/>
      <!-- Arms -->
      <line x1="70" y1="218" x2="62" y2="227" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
      <line x1="82" y1="218" x2="90" y2="227" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
      <!-- Legs -->
      <line x1="74" y1="231" x2="72" y2="244" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round"/>
      <line x1="78" y1="231" x2="80" y2="244" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round"/>

    </svg>

    <!-- Heading -->
    <h1 style="font-size:clamp(20px,4vw,28px);font-weight:700;color:#111827;margin:0 0 10px;line-height:1.3;">
      Page under maintenance
    </h1>

    <!-- Sub text -->
    <p style="font-size:15px;color:#6b7280;max-width:320px;margin:0 auto 36px;line-height:1.7;">
      This section is currently undergoing scheduled maintenance. We should be back shortly!
    </p>

    <!-- CTA -->
    <a href="/pyq"
       class="explore-btn"
       style="display:inline-flex;align-items:center;gap:9px;background:#1B3C53;color:#fff;font-size:15px;font-weight:600;padding:13px 30px;border-radius:10px;text-decoration:none;cursor:pointer;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      Explore PYQs

  </div>

  <!-- Footer -->
  <p style="font-size:12px;color:#d1d5db;margin-top:28px;">
